services:
  - type: cron
    name: tg-hunter
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python hunter.py
    envVars:
      - key: TG_API_ID
        value: 2040
      - key: TG_API_HASH
        value: b18441a1ff607e10a989891a5462e627
      - key: TG_PHONE
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: CLAUDE_PROXY_URL
        sync: false
      - key: TIMEWEB_API
        sync: false
      - key: TG_CHANNELS
        sync: false
      - key: USER_PROFILE
        sync: false
